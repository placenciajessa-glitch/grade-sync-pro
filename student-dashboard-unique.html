<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Dashboard - GradeSync Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0B3B2A 0%, #1A4F3A 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .app-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 100, 0, 0.4);
            overflow: hidden;
            border: 2px solid #2E7D32;
        }

        .header {
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
            padding: 20px 24px;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFFFFF 0%, #E8F5E9 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #1B5E20;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .logo-text span {
            color: #C8E6C9;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification-icon {
            background: rgba(255, 255, 255, 0.2);
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .notification-icon:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FF4444;
            color: white;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .student-info {
            margin-top: 15px;
            color: white;
        }

        .student-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .student-details {
            display: flex;
            gap: 15px;
            font-size: 12px;
            opacity: 0.9;
            flex-wrap: wrap;
        }

        .student-details span {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 30px;
        }

        .content {
            padding: 20px;
            background: #F1F8E9;
            min-height: 600px;
        }

        .gpa-card {
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            border-radius: 24px;
            padding: 20px;
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }

        .gpa-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .gpa-title {
            font-size: 14px;
            opacity: 0.9;
        }

        .gpa-value {
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
        }

        .gpa-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pass {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .status-fail {
            background: #FF4444;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.8;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 15px;
            color: #1B5E20;
        }

        .section-title h3 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .view-all {
            color: #2E7D32;
            font-size: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            background: white;
            border: 1px solid #A5D6A7;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .view-all:hover {
            background: #2E7D32;
            color: white;
            border-color: #2E7D32;
        }

        .grades-table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #A5D6A7;
            margin-bottom: 20px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            background: #E8F5E9;
            padding: 12px;
            font-weight: 700;
            color: #1B5E20;
            font-size: 12px;
            text-align: center;
        }

        .table-header span:first-child {
            text-align: left;
        }

        .table-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            padding: 12px;
            border-top: 1px solid #C8E6C9;
            font-size: 12px;
            text-align: center;
            align-items: center;
            transition: all 0.3s;
        }

        .table-row:hover {
            background: #F1F8E9;
        }

        .table-row span:first-child {
            text-align: left;
            font-weight: 500;
        }

        .grade-pass {
            color: #2E7D32;
            font-weight: 700;
        }

        .grade-fail {
            color: #C62828;
            font-weight: 700;
        }

        .grade-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
        }

        .badge-pass {
            background: #A5D6A7;
            color: #1B5E20;
        }

        .badge-fail {
            background: #FFCDD2;
            color: #C62828;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-card {
            background: white;
            border: 2px solid #A5D6A7;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
        }

        .action-card:hover {
            transform: translateY(-5px);
            border-color: #2E7D32;
            background: #E8F5E9;
            box-shadow: 0 8px 16px rgba(46, 125, 50, 0.15);
        }

        .action-card:active {
            transform: translateY(-2px);
        }

        .action-icon {
            font-size: 24px;
            color: #2E7D32;
            margin-bottom: 8px;
        }

        .action-title {
            font-weight: 600;
            color: #1B5E20;
            font-size: 13px;
        }

        .teacher-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            border: 2px solid #A5D6A7;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .teacher-card:hover {
            transform: translateX(5px);
            border-color: #2E7D32;
            background: #E8F5E9;
        }

        .teacher-avatar {
            width: 50px;
            height: 50px;
            background: #2E7D32;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .teacher-info {
            flex: 1;
        }

        .teacher-name {
            font-weight: 700;
            color: #1B5E20;
            font-size: 16px;
            margin-bottom: 3px;
        }

        .teacher-email {
            font-size: 11px;
            color: #2E7D32;
        }

        .teacher-status {
            font-size: 11px;
            color: #2E7D32;
            margin-top: 5px;
        }

        .footer {
            background: white;
            padding: 15px;
            text-align: center;
            color: #2E7D32;
            font-size: 11px;
            border-top: 2px solid #A5D6A7;
        }

        .footer i {
            margin: 0 3px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 32px;
            max-width: 320px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #2E7D32;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h3 {
            color: #1B5E20;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }

        .notification-item {
            padding: 12px;
            border-bottom: 1px solid #C8E6C9;
            font-size: 13px;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-item.unread {
            background: #E8F5E9;
        }

        .notification-time {
            font-size: 10px;
            color: #2E7D32;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            border: 2px solid #2E7D32;
            border-radius: 24px;
            background: transparent;
            color: #2E7D32;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #2E7D32;
            color: white;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .info-text {
            font-size: 11px;
            color: #2E7D32;
            margin-top: 5px;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #2E7D32;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 10px;
            color: #A5D6A7;
        }

        .grade-tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .grade-tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1B5E20;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 10px;
            white-space: nowrap;
            z-index: 10;
        }

        .invite-code-input {
            background: #E8F5E9;
            border: 2px dashed #2E7D32;
            border-radius: 16px;
            padding: 12px;
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }

        .invite-code-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #A5D6A7;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .invite-code-input button {
            padding: 10px 15px;
            background: #2E7D32;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .invite-code-input button:hover {
            background: #1B5E20;
        }

        .refresh-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            margin-left: 5px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .toast-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2E7D32;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 2000;
            animation: toastSlideDown 0.3s ease;
        }

        @keyframes toastSlideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        .teacher-name-tag {
            font-size: 9px;
            color: #2E7D32;
            display: block;
            margin-top: 2px;
        }

        .college-grade {
            font-weight: 700;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-top">
                <div class="app-logo">
                    <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                    <div class="logo-text">Grade<span>Sync</span></div>
                </div>
                <div class="user-badge">
                    <div class="notification-icon" onclick="showNotifications()">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" id="notificationCount">0</span>
                    </div>
                    <button class="logout-btn" onclick="logout()" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
            
            <div class="student-info">
                <div class="student-name" id="studentName">Loading...</div>
                <div class="student-details" id="studentDetails"></div>
            </div>
        </div>
        
        <div class="content">
            <div id="teacherContainer" style="display: none;"></div>

            <div id="inviteCodeContainer" style="display: none;" class="invite-code-input">
                <input type="text" id="inviteCode" placeholder="Enter teacher invite code">
                <button onclick="connectWithInviteCode()"><i class="fas fa-link"></i> Connect</button>
            </div>

            <div class="gpa-card" id="gpaCard">
                <div class="gpa-header">
                    <span class="gpa-title" id="gpaTitle">College GPA (1.0-5.0)</span>
                    <span class="gpa-status" id="gpaStatus">Loading...</span>
                </div>
                <div class="gpa-value" id="gpaValue">0.0</div>
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalSubjects">0</div>
                        <div class="stat-label">Subjects</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="passedSubjects">0</div>
                        <div class="stat-label">Passed</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="failedSubjects">0</div>
                        <div class="stat-label">Failed</div>
                    </div>
                </div>
                <div class="info-text" id="passingInfo">
                    <i class="fas fa-info-circle"></i> Passing grade: 1.0 - 3.0 | Failing: 5.0
                </div>
            </div>

            <div class="quick-actions">
                <a href="my-grades-enhanced.html" class="action-card">
                    <div class="action-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="action-title">View All Grades</div>
                </a>
               
            </div>

            <div class="section-title">
                <h3><i class="fas fa-clock"></i> Recent Grades <span class="refresh-indicator" title="Auto-refresh every 10 seconds"></span></h3>
                <a href="my-grades-enhanced.html" class="view-all">View All <i class="fas fa-arrow-right"></i></a>
            </div>

            <div class="grades-table">
                <div class="table-header">
                    <span>Subject</span>
                    <span>Prelim</span>
                    <span>Midterm</span>
                    <span>Final</span>
                    <span>Status</span>
                </div>
                <div id="gradesList">
                </div>
            </div>
        </div>
        
        <div class="footer">
            <i class="fas fa-calendar"></i> Academic Year <span id="academicYear"></span> 
            <i class="fas fa-circle" style="font-size: 4px; margin: 0 5px;"></i>
            College
        </div>
    </div>

    <div id="notificationModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-bell"></i> Notifications</h3>
            <div id="notificationsList">
                <div class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <p>No notifications</p>
                </div>
            </div>
            <button class="btn-secondary" onclick="closeNotifications()">Close</button>
        </div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('currentSession'));
        
        if (!session || session.role !== 'student') {
            window.location.href = 'index.html';
        }

        const allUsers = JSON.parse(localStorage.getItem('grade_sync_users')) || [];

        function loadStudentData() {
            try {
                const grades = JSON.parse(localStorage.getItem(session.storageKeys.grades)) || [];
                const notifications = JSON.parse(localStorage.getItem(session.storageKeys.notifications)) || [];
                console.log('Loaded grades:', grades.length);
                return { grades, notifications };
            } catch (e) {
                console.error('Error loading student data:', e);
                return { grades: [], notifications: [] };
            }
        }

        let { grades, notifications } = loadStudentData();

        function formatCollegeGrade(value) {
            if (value === undefined || value === null) return '0.0';
            const num = parseFloat(value);
            if (isNaN(num)) return '0.0';
            return num.toFixed(1);
        }

        function isPassing(grade) {
            const avg = parseFloat(grade.collegeGrade);
            if (isNaN(avg)) return false;
            return avg <= 3.0 && avg >= 1.0;
        }

        function getPassingStatusText(grade) {
            return isPassing(grade) ? 'PASS' : 'FAIL';
        }

        function getStatusBadgeHTML(grade) {
            const passed = isPassing(grade);
            const avg = parseFloat(grade.collegeGrade);
            
            if (passed) {
                return `<span class="grade-badge badge-pass"><i class="fas fa-check-circle"></i> PASS (${avg.toFixed(1)})</span>`;
            } else {
                return `<span class="grade-badge badge-fail"><i class="fas fa-times-circle"></i> FAIL (${avg.toFixed(1)} > 3.0)</span>`;
            }
        }

        function showToast(message, isSuccess = true) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.background = isSuccess ? '#2E7D32' : '#C62828';
            toast.innerHTML = `<i class="fas fa-${isSuccess ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function displayStudentInfo() {
            const firstName = session.firstName || session.name || 'Student';
            const lastName = session.lastName || '';
            const fullName = lastName ? `${firstName} ${lastName}` : firstName;
            
            document.getElementById('studentName').textContent = fullName;
            
            document.getElementById('studentDetails').innerHTML = `
                <span><i class="fas fa-graduation-cap"></i> ${session.yearLevel || 'College'}</span>
                <span><i class="fas fa-users"></i> ${session.section || 'No section'}</span>
                <span><i class="fas fa-calendar"></i> ${session.academicYear || 'N/A'}</span>
            `;
            
            document.getElementById('academicYear').textContent = session.academicYear || 'N/A';
        }

        function checkTeacherConnection() {
            const teacherContainer = document.getElementById('teacherContainer');
            const inviteCodeContainer = document.getElementById('inviteCodeContainer');
            
            if (session.teacherId) {
                const teacher = allUsers.find(u => u.id === session.teacherId);
                if (teacher) {
                    teacherContainer.style.display = 'block';
                    inviteCodeContainer.style.display = 'none';
                    teacherContainer.innerHTML = `
                        <div class="teacher-card" onclick="viewTeacherProfile()">
                            <div class="teacher-avatar">
                                <i class="fas fa-chalkboard-teacher"></i>
                            </div>
                            <div class="teacher-info">
                                <div class="teacher-name">${escapeHtml(teacher.name || teacher.username || 'Your Teacher')}</div>
                                <div class="teacher-email">${escapeHtml(teacher.email)}</div>
                                <div class="teacher-status">
                                    <i class="fas fa-check-circle" style="color: #2E7D32;"></i> Connected
                                </div>
                            </div>
                        </div>
                    `;
                }
            } else {
                teacherContainer.style.display = 'none';
                
                let foundTeacher = false;
                for (let user of allUsers) {
                    if (user.role === 'teacher') {
                        try {
                            const teacherStudents = JSON.parse(localStorage.getItem(user.storageKeys.students)) || [];
                            const found = teacherStudents.find(s => s.email && session.email && s.email.toLowerCase() === session.email.toLowerCase());
                            if (found) {
                                session.teacherId = user.id;
                                localStorage.setItem('currentSession', JSON.stringify(session));
                                
                                const userIndex = allUsers.findIndex(u => u.id === session.id);
                                if (userIndex !== -1) {
                                    allUsers[userIndex].teacherId = user.id;
                                    localStorage.setItem('grade_sync_users', JSON.stringify(allUsers));
                                }
                                
                                foundTeacher = true;
                                location.reload();
                                break;
                            }
                        } catch (e) {
                            console.error('Error checking teacher students:', e);
                        }
                    }
                }
                
                if (!foundTeacher) {
                    inviteCodeContainer.style.display = 'flex';
                }
            }
        }

        function connectWithInviteCode() {
            const inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();
            if (!inviteCode) {
                alert('Please enter an invite code');
                return;
            }
            
            const teacher = allUsers.find(u => u.role === 'teacher' && u.inviteCode === inviteCode);
            
            if (teacher) {
                session.teacherId = teacher.id;
                localStorage.setItem('currentSession', JSON.stringify(session));
                
                const userIndex = allUsers.findIndex(u => u.id === session.id);
                if (userIndex !== -1) {
                    allUsers[userIndex].teacherId = teacher.id;
                    localStorage.setItem('grade_sync_users', JSON.stringify(allUsers));
                }
                
                notifications.push({
                    id: Date.now(),
                    type: 'connection',
                    message: `Connected to teacher ${teacher.name || teacher.username}`,
                    timestamp: new Date().toISOString(),
                    read: false
                });
                localStorage.setItem(session.storageKeys.notifications, JSON.stringify(notifications));
                
                alert('Successfully connected to teacher!');
                location.reload();
            } else {
                alert('Invalid invite code. Please check with your teacher.');
            }
        }

        function viewTeacherProfile() {
            alert(`Teacher: ${session.teacherId ? 'Connected' : 'Not connected'}`);
        }

        function updateNotificationBadge() {
            const unreadCount = notifications.filter(n => !n.read).length;
            document.getElementById('notificationCount').textContent = unreadCount;
        }

        function calculateStats() {
            if (grades.length === 0) {
                document.getElementById('gpaValue').textContent = '0.0';
                document.getElementById('gpaStatus').textContent = 'No Grades';
                document.getElementById('totalSubjects').textContent = '0';
                document.getElementById('passedSubjects').textContent = '0';
                document.getElementById('failedSubjects').textContent = '0';
                return;
            }

            let totalGrade = 0;
            let passed = 0;
            let failed = 0;

            grades.forEach(grade => {
                const collegeGrade = parseFloat(grade.collegeGrade);
                if (!isNaN(collegeGrade)) {
                    totalGrade += collegeGrade;
                    
                    if (collegeGrade <= 3.0 && collegeGrade >= 1.0) {
                        passed++;
                    } else {
                        failed++;
                    }
                }
            });

            const overallAvg = totalGrade / grades.length;
            
            document.getElementById('gpaValue').textContent = formatCollegeGrade(overallAvg);
            
            const isOverallPassing = overallAvg <= 3.0 && overallAvg >= 1.0;

            document.getElementById('gpaStatus').textContent = isOverallPassing ? 'PASSING' : 'FAILING';
            document.getElementById('gpaStatus').className = 'gpa-status ' + (isOverallPassing ? 'status-pass' : 'status-fail');
            document.getElementById('totalSubjects').textContent = grades.length;
            document.getElementById('passedSubjects').textContent = passed;
            document.getElementById('failedSubjects').textContent = failed;
        }

        function displayRecentGrades() {
            const gradesList = document.getElementById('gradesList');
            
            if (grades.length === 0) {
                gradesList.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No grades yet</p><p style="font-size: 11px;">Your teacher will add grades here</p></div>';
                return;
            }

            const recentGrades = [...grades].sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)).slice(0, 5);
            
            let html = '';
            recentGrades.forEach(grade => {
                const passed = isPassing(grade);
                const statusClass = passed ? 'grade-pass' : 'grade-fail';
                const statusBadge = getStatusBadgeHTML(grade);
                
                const teacherName = grade.teacherName ? 
                    `<span class="teacher-name-tag"><i class="fas fa-chalkboard-teacher"></i> ${escapeHtml(grade.teacherName)}</span>` : '';

                let prelimDisplay = 'N/A', midtermDisplay = 'N/A', finalDisplay = 'N/A';
                
                if (grade.originalInput && grade.originalInput.type === 'college') {
                    prelimDisplay = parseFloat(grade.originalInput.prelim).toFixed(1);
                    midtermDisplay = parseFloat(grade.originalInput.midterm).toFixed(1);
                    finalDisplay = parseFloat(grade.originalInput.final).toFixed(1);
                } else {
                    if (grade.prelim) prelimDisplay = parseFloat(grade.prelim).toFixed(1);
                    if (grade.midterm) midtermDisplay = parseFloat(grade.midterm).toFixed(1);
                    if (grade.final) finalDisplay = parseFloat(grade.final).toFixed(1);
                }

                html += `
                    <div class="table-row">
                        <span>
                            ${escapeHtml(grade.subject || 'Subject')}
                            ${teacherName}
                        </span>
                        <span>${prelimDisplay}</span>
                        <span>${midtermDisplay}</span>
                        <span>${finalDisplay}</span>
                        <span>${statusBadge}</span>
                    </div>
                `;
            });

            gradesList.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showNotifications() {
            const modal = document.getElementById('notificationModal');
            const list = document.getElementById('notificationsList');
            
            if (notifications.length === 0) {
                list.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications</p></div>';
            } else {
                let html = '';
                [...notifications].reverse().forEach(n => {
                    const date = new Date(n.timestamp).toLocaleString();
                    const unreadClass = n.read ? '' : 'unread';
                    html += `
                        <div class="notification-item ${unreadClass}">
                            <div>${escapeHtml(n.message)}</div>
                            <div class="notification-time">
                                <i class="far fa-clock"></i> ${date}
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            }
            
            notifications.forEach(n => n.read = true);
            localStorage.setItem(session.storageKeys.notifications, JSON.stringify(notifications));
            document.getElementById('notificationCount').textContent = '0';
            
            modal.classList.add('show');
        }

        function closeNotifications() {
            document.getElementById('notificationModal').classList.remove('show');
        }

        function logout() {
            try {
                const activity = JSON.parse(localStorage.getItem(session.storageKeys.activity)) || [];
                activity.push({
                    type: 'logout',
                    timestamp: new Date().toISOString()
                });
                localStorage.setItem(session.storageKeys.activity, JSON.stringify(activity));
            } catch (e) {
                console.error('Error logging activity:', e);
            }
            
            localStorage.removeItem('currentSession');
            window.location.href = 'index.html';
        }

        function refreshDashboard() {
            const freshData = loadStudentData();
            
            grades = freshData.grades;
            notifications = freshData.notifications;
            
            updateNotificationBadge();
            calculateStats();
            displayRecentGrades();
            
            console.log('Dashboard refreshed. Grades:', grades.length);
        }

        function init() {
            displayStudentInfo();
            checkTeacherConnection();
            updateNotificationBadge();
            calculateStats();
            displayRecentGrades();
            
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('showNotifications') === 'true') {
                setTimeout(() => showNotifications(), 500);
            }
        }

        init();

        setInterval(() => {
            refreshDashboard();
        }, 10000);

        window.refreshDashboard = refreshDashboard;
        
        window.addEventListener('storage', function(e) {
            if (e.key === session.storageKeys.grades) {
                console.log('Grades updated in another tab, refreshing...');
                refreshDashboard();
                showToast('Grades updated by teacher!', true);
            }
        });
    </script>
</body>
</html>
